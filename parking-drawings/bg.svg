        <!-- lighter pebbles -->
        <circle cx="6" cy="8" r="1.2" fill="#5c5c5c"/>
        <circle cx="18" cy="5" r="0.9" fill="#666"/>
        <circle cx="30" cy="10" r="1.1" fill="#5f5f5f"/>
