<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f3136"/>
      <stop offset="100%" stop-color="#1f2125"/>
    </linearGradient>

    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c4f54"/>
      <stop offset="100%" stop-color="#3a3d42"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <pattern id="asphaltTexture" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#44484d"/>
      <circle cx="5" cy="7" r="1" fill="#55595e"/>
      <circle cx="14" cy="5" r="0.8" fill="#36393d"/>
      <circle cx="22" cy="10" r="1" fill="#5a5e63"/>
      <circle cx="9" cy="18" r="0.9" fill="#34373b"/>
      <circle cx="20" cy="20" r="1" fill="#5a5e63"/>
      <circle cx="6" cy="24" r="0.8" fill="#383b3f"/>
    </pattern>
  </defs>

  <!-- card background -->
  <rect width="500" height="280" rx="28" fill="url(#bg)"/>

  <!-- asphalt area -->
  <rect x="18" y="18" width="464" height="244" rx="22" fill="url(#asphaltTexture)"/>

  <!-- road lane -->
  <rect x="140" y="18" width="220" height="244" fill="url(#road)" opacity="0.95"/>

  <!-- dashed center lines -->
  <rect x="245" y="35" width="10" height="28" rx="4" fill="#f4d35e"/>
  <rect x="245" y="80" width="10" height="28" rx="4" fill="#f4d35e"/>
  <rect x="245" y="125" width="10" height="28" rx="4" fill="#f4d35e"/>
  <rect x="245" y="170" width="10" height="28" rx="4" fill="#f4d35e"/>
  <rect x="245" y="215" width="10" height="28" rx="4" fill="#f4d35e"/>

  <!-- parking spot -->
  <rect x="50" y="70" width="70" height="130" fill="none" stroke="white" stroke-width="5"/>
  <text x="85" y="145" text-anchor="middle" font-size="42" font-family="Arial Black, Arial, sans-serif" fill="white">P</text>

  <!-- cones -->
  <circle cx="390" cy="75" r="13" fill="#ff7a00" stroke="#111" stroke-width="2"/>
  <circle cx="390" cy="75" r="7" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="420" cy="105" r="13" fill="#ff7a00" stroke="#111" stroke-width="2"/>
  <circle cx="420" cy="105" r="7" fill="none" stroke="white" stroke-width="3"/>

  <!-- barrier -->
  <rect x="375" y="150" width="70" height="20" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
  <rect x="382" y="153" width="12" height="14" fill="#d62828"/>
  <rect x="405" y="153" width="12" height="14" fill="#d62828"/>
  <rect x="428" y="153" width="12" height="14" fill="#d62828"/>

  <!-- car shadow -->
  <ellipse cx="215" cy="165" rx="24" ry="46" fill="#000" opacity="0.22" transform="rotate(28 215 165)"/>

  <!-- car -->
  <g transform="rotate(28 215 165)" filter="url(#shadow)">
    <rect x="185" y="131" width="15" height="18" rx="5" fill="#111"/>
    <rect x="230" y="131" width="15" height="18" rx="5" fill="#111"/>
    <rect x="185" y="185" width="15" height="18" rx="5" fill="#111"/>
    <rect x="230" y="185" width="15" height="18" rx="5" fill="#111"/>
    <rect x="190" y="115" width="50" height="100" rx="12" fill="#2563eb"/>
    <rect x="197" y="128" width="36" height="18" rx="4" fill="#8fd3ff"/>
    <rect x="197" y="155" width="36" height="20" rx="4" fill="#123c9c"/>
    <rect x="197" y="184" width="36" height="18" rx="4" fill="#8fd3ff"/>
    <rect x="195" y="118" width="8" height="6" rx="2" fill="#ffd84d"/>
    <rect x="227" y="118" width="8" height="6" rx="2" fill="#ffd84d"/>
    <rect x="195" y="208" width="40" height="3" rx="2" fill="#e63946"/>
  </g>

  <!-- title panel -->
  <rect x="245" y="190" width="250" height="48" rx="14" fill="#111" opacity="0.82"/>
  <text x="370" y="209" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#f4d35e" letter-spacing="2">PLAY NOW</text>
  <text x="370" y="228" text-anchor="middle" font-size="24" font-weight="900" font-family="Arial Black, Arial, sans-serif" fill="white">PARKING GAME</text>
</svg>