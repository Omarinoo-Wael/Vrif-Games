<svg width="122" height="202" viewBox="0 0 122 202" xmlns="http://www.w3.org/2000/svg">
    <g id="switch" transform="rotate(0, 0, 0)">
        <line x1="20" y1="20" x2="20" y2="200" stroke="white" stroke-width="4"/>
        <line x1="120" y1="20" x2="120" y2="200" stroke="white" stroke-width="4"/>
        <line x1="20" y1="200" x2="120" y2="200" stroke="white" stroke-width="4"/>
        <line x1="20" y1="20" x2="120" y2="20" stroke="white" stroke-width="4"/>

        <!-- dashed guide box -->
        <rect x="35" y="55" width="70" height="110" fill="none" stroke="#00ff88" stroke-width="3" stroke-dasharray="8 6"/>

        <!-- reverse arrow -->
        <line x1="70" y1="30" x2="70" y2="95" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
        <polygon points="70,110 55,85 85,85" fill="#00ff88"/>
    </g>
    
</svg>